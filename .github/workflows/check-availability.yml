name: Check Pickleball Availability

on:
  schedule:
    # Every hour between 7am–10pm ET (11:00–02:00 UTC)
    - cron: '0 11-23,0-2 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run availability check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node scripts/check.js

      - name: Commit updated status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "chore: update availability status [skip ci]"
          git push

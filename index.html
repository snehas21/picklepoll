<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picklepoll – Pickleball Availability Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0faf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px 36px;
      max-width: 620px;
      width: 100%;
    }

    .header { text-align: center; margin-bottom: 28px; }
    .logo   { font-size: 48px; margin-bottom: 10px; }
    h1      { font-size: 1.6rem; color: #1a4731; margin-bottom: 6px; }
    .subtitle { color: #5a7a69; font-size: 0.93rem; }

    /* Check button */
    #check-btn {
      background: #2e7d52;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 36px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
      margin-bottom: 22px;
    }
    #check-btn:hover:not(:disabled) { background: #245f3f; }
    #check-btn:active:not(:disabled) { transform: scale(0.98); }
    #check-btn:disabled { background: #a0c4b0; cursor: not-allowed; }

    /* Overall status badge */
    #status {
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      padding: 11px 26px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .badge.available   { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .badge.unavailable { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .badge.loading     { background: #fff3cd; color: #856404; border: 2px solid #ffc107;
                         animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .error-msg { color: #c0392b; font-size: 0.85rem; text-align: center; }

    /* Slot cards */
    .slots { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

    .slot {
      border: 1.5px solid #c8ddd4;
      border-radius: 10px;
      padding: 14px 16px;
      background: #f7fcf9;
    }

    .slot-title {
      font-weight: 700;
      color: #1a4731;
      font-size: 0.97rem;
      margin-bottom: 6px;
    }

    .slot-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.82rem;
      color: #5a7a69;
    }

    .slot-meta span { display: flex; align-items: center; gap: 4px; }

    .openings-pill {
      display: inline-block;
      background: #d4edda;
      color: #155724;
      border-radius: 20px;
      padding: 1px 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .booking-link {
      display: inline-block;
      margin-top: 8px;
      color: #2e7d52;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
    }
    .booking-link:hover { text-decoration: underline; }

    /* Skipped section */
    .skipped-section {
      border-top: 1px solid #e0eeea;
      padding-top: 14px;
      margin-bottom: 18px;
    }

    .skipped-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #a0b8aa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .skipped-item {
      font-size: 0.8rem;
      color: #a0b8aa;
      padding: 2px 0;
    }

    .skipped-item .reason {
      background: #f8d7da;
      color: #721c24;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-right: 5px;
    }

    /* Log panel */
    .log-section { border-top: 1px solid #e0eeea; padding-top: 18px; }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .log-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #5a7a69;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .clear-btn {
      background: none; border: none;
      color: #aaa; font-size: 0.73rem;
      cursor: pointer; text-decoration: underline;
    }
    .clear-btn:hover { color: #c0392b; }

    #log-box {
      background: #0f1c15;
      color: #b2f0c8;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.76rem;
      line-height: 1.6;
      max-height: 220px;
      overflow-y: auto;
      min-height: 48px;
    }

    .log-line { display: flex; gap: 10px; }
    .log-ts   { color: #5a9a72; flex-shrink: 0; }
    .log-msg.info    { color: #b2f0c8; }
    .log-msg.warn    { color: #ffe08a; }
    .log-msg.error   { color: #ff8080; }
    .log-msg.success { color: #6effa8; font-weight: bold; }
    .log-msg.dim     { color: #5a9a72; }
    .log-empty       { color: #3a6a4a; font-style: italic; }

    .last-checked { text-align: center; margin-top: 14px; font-size: 0.76rem; color: #a0b8aa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">🏓</div>
      <h1>Picklepoll</h1>
      <p class="subtitle">Pickleball court availability — Richmond Hill (ages 40–50, open spots only)</p>
    </div>

    <button id="check-btn" onclick="loadStatus()">Check Availability</button>

    <div id="status"></div>
    <div id="slots"  class="slots"></div>
    <div id="skipped-section"></div>

    <div class="log-section">
      <div class="log-header">
        <span class="log-title">Log</span>
        <button class="clear-btn" onclick="clearLog()">Clear</button>
      </div>
      <div id="log-box"><span class="log-empty">No requests yet.</span></div>
    </div>

    <div id="last-checked" class="last-checked"></div>
  </div>

  <script>
    const BOOKING_URL =
      'https://anc.ca.apm.activecommunities.com/richmondhill/activity/search' +
      '?onlineSiteId=0&activity_select_param=2&open_spots=1&min_age=40' +
      '&activity_keyword=pickleball&max_age=50&viewMode=list';

    /* ── Logging ── */
    function ts() { return new Date().toLocaleTimeString('en-CA', { hour12: false }); }

    function addLog(level, msg) {
      const box = document.getElementById('log-box');
      box.querySelector('.log-empty')?.remove();
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML =
        `<span class="log-ts">[${ts()}]</span>` +
        `<span class="log-msg ${level}">${esc(msg)}</span>`;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log-box').innerHTML =
        '<span class="log-empty">No requests yet.</span>';
    }

    /* ── Load status.json ── */
    async function loadStatus() {
      const btn       = document.getElementById('check-btn');
      const statusEl  = document.getElementById('status');
      const slotsEl   = document.getElementById('slots');
      const skippedEl = document.getElementById('skipped-section');
      const lcEl      = document.getElementById('last-checked');

      btn.disabled = true;
      btn.textContent = 'Loading…';
      statusEl.innerHTML  = '<span class="badge loading">Checking…</span>';
      slotsEl.innerHTML   = '';
      skippedEl.innerHTML = '';
      lcEl.textContent    = '';

      addLog('info', '── Fetching latest status ──');

      try {
        // Cache-bust so we always get the freshest status.json
        const res = await fetch('./status.json?t=' + Date.now());
        addLog('info', `status.json → HTTP ${res.status} (${res.statusText})`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        addLog('dim', `Last checked by workflow: ${data.checkedAt || 'never'}`);
        addLog('dim', `Total Enroll Now found: ${data.total} | Qualified: ${data.qualified?.length ?? 0} | Skipped: ${data.skipped?.length ?? 0}`);

        if (data.error && !data.checkedAt) {
          throw new Error(data.error);
        }

        renderResults(data, statusEl, slotsEl, skippedEl);

        const checkedAt = data.checkedAt
          ? new Date(data.checkedAt).toLocaleString()
          : 'never';
        lcEl.textContent = `Last automatically checked: ${checkedAt}`;

        if (data.error) {
          addLog('warn', `Workflow reported error: ${data.error}`);
        }

      } catch (err) {
        addLog('error', `Failed to load status: ${err.message}`);
        statusEl.innerHTML = `
          <span class="badge unavailable">Error</span>
          <span class="error-msg">${esc(err.message)}</span>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check Availability';
        addLog('dim', '── Done ──');
      }
    }

    function renderResults(data, statusEl, slotsEl, skippedEl) {
      if (data.available && data.qualified?.length) {
        addLog('success', `✓ AVAILABLE — ${data.qualified.length} open slot(s) found`);
        statusEl.innerHTML = `<span class="badge available">✓ Available!</span>`;

        for (const slot of data.qualified) {
          addLog('info', `  Slot: ${slot.title}${slot.openings ? ' — ' + slot.openings + ' opening(s)' : ''}`);
          const div = document.createElement('div');
          div.className = 'slot';
          div.innerHTML = `
            <div class="slot-title">${esc(slot.title)}</div>
            <div class="slot-meta">
              ${slot.openings != null ? `<span><span class="openings-pill">${slot.openings} opening${slot.openings !== 1 ? 's' : ''}</span></span>` : ''}
              ${slot.date ? `<span>📅 ${esc(slot.date)}</span>` : ''}
              ${slot.time ? `<span>🕐 ${esc(slot.time)}</span>` : ''}
            </div>
            <a class="booking-link" href="${esc(BOOKING_URL)}" target="_blank" rel="noopener">Enroll Now →</a>`;
          slotsEl.appendChild(div);
        }

      } else {
        addLog('warn', '✗ No qualifying slots found');
        statusEl.innerHTML = `
          <span class="badge unavailable">No Openings</span>
          <a class="booking-link" href="${esc(BOOKING_URL)}" target="_blank" rel="noopener"
             style="margin-top:8px">Check booking site →</a>`;
      }

      // Show skipped items
      if (data.skipped?.length) {
        addLog('dim', `Skipped: ${data.skipped.map(s => s.reason).join(', ')}`);
        let html = '<div class="skipped-section"><div class="skipped-title">Filtered out</div>';
        for (const s of data.skipped) {
          html += `<div class="skipped-item">
            <span class="reason">${esc(s.reason)}</span>${esc(s.title || '')}
          </div>`;
        }
        html += '</div>';
        skippedEl.innerHTML = html;
      }
    }

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>

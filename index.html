<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picklepoll – Pickleball Availability Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0faf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px 36px;
      max-width: 600px;
      width: 100%;
    }

    .header { text-align: center; margin-bottom: 32px; }
    .logo   { font-size: 48px; margin-bottom: 10px; }
    h1      { font-size: 1.6rem; color: #1a4731; margin-bottom: 6px; }
    .subtitle { color: #5a7a69; font-size: 0.95rem; }

    /* URL editor */
    .url-section { margin-bottom: 20px; }

    .url-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .url-label span { font-size: 0.8rem; font-weight: 600; color: #5a7a69; text-transform: uppercase; letter-spacing: 0.05em; }

    #url-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #c8ddd4;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: monospace;
      color: #1a4731;
      background: #f7fcf9;
      resize: vertical;
      min-height: 72px;
      transition: border-color 0.2s;
    }
    #url-input:focus { outline: none; border-color: #2e7d52; background: #fff; }

    .reset-btn {
      background: none;
      border: none;
      color: #2e7d52;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 2px 0;
      text-decoration: underline;
    }
    .reset-btn:hover { color: #1a4731; }

    /* Check button */
    #check-btn {
      background: #2e7d52;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
      margin-bottom: 24px;
    }
    #check-btn:hover:not(:disabled) { background: #245f3f; }
    #check-btn:active:not(:disabled) { transform: scale(0.98); }
    #check-btn:disabled { background: #a0c4b0; cursor: not-allowed; }

    /* Result badge */
    #status {
      text-align: center;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .badge.available   { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .badge.unavailable { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    .badge.loading     { background: #fff3cd; color: #856404; border: 2px solid #ffc107;
                         animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .detail    { font-size: 0.85rem; color: #5a7a69; }
    .error-msg { color: #c0392b; font-size: 0.88rem; }

    .booking-link {
      display: inline-block;
      margin-top: 4px;
      color: #2e7d52;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
    }
    .booking-link:hover { text-decoration: underline; }

    /* Log panel */
    .log-section { border-top: 1px solid #e0eeea; padding-top: 20px; }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .log-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #5a7a69;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .log-actions { display: flex; gap: 10px; align-items: center; }

    .clear-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
    }
    .clear-btn:hover { color: #c0392b; }

    #log-box {
      background: #0f1c15;
      color: #b2f0c8;
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      max-height: 280px;
      overflow-y: auto;
      min-height: 60px;
    }

    .log-line { display: flex; gap: 10px; }
    .log-ts   { color: #5a9a72; flex-shrink: 0; }
    .log-msg  { color: #d4f5e2; white-space: pre-wrap; word-break: break-all; }
    .log-msg.info  { color: #b2f0c8; }
    .log-msg.warn  { color: #ffe08a; }
    .log-msg.error { color: #ff8080; }
    .log-msg.success { color: #6effa8; font-weight: bold; }
    .log-msg.dim   { color: #5a9a72; }

    .log-empty { color: #3a6a4a; font-style: italic; }

    .last-checked { text-align: center; margin-top: 14px; font-size: 0.78rem; color: #a0b8aa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">🏓</div>
      <h1>Picklepoll</h1>
      <p class="subtitle">Check pickleball court availability in Richmond Hill</p>
    </div>

    <div class="url-section">
      <div class="url-label">
        <span>Booking URL</span>
        <button class="reset-btn" onclick="resetUrl()">Reset to default</button>
      </div>
      <textarea id="url-input" spellcheck="false"></textarea>
    </div>

    <button id="check-btn" onclick="checkAvailability()">Check Availability</button>

    <div id="status"></div>

    <div class="log-section">
      <div class="log-header">
        <span class="log-title">Request Log</span>
        <div class="log-actions">
          <button class="clear-btn" onclick="clearLog()">Clear</button>
        </div>
      </div>
      <div id="log-box"><span class="log-empty">No requests yet.</span></div>
    </div>

    <div id="last-checked" class="last-checked"></div>
  </div>

  <script>
    const DEFAULT_URL =
      'https://anc.ca.apm.activecommunities.com/richmondhill/activity/search' +
      '?onlineSiteId=0&activity_select_param=2&open_spots=1&min_age=40' +
      '&activity_keyword=pickleball&max_age=50&viewMode=list';

    // Each proxy has a different request/response shape:
    //   build(url)    → full fetch URL
    //   extract(res)  → Promise<string> of the page text/HTML
    //   jsRendered    → true if it runs a real headless browser (waits for JS)
    const PROXIES = [
      {
        // Jina Reader: headless browser, executes JS, waits for page to render.
        // Returns markdown of the fully-rendered page. Best for SPAs.
        name: 'r.jina.ai (headless browser)',
        jsRendered: true,
        build: url => 'https://r.jina.ai/' + url,
        extract: res => res.text(),
        timeout: 40000, // page load + JS execution can take a while
      },
      {
        // Raw HTML proxies below — these do NOT execute JavaScript.
        // They will only work if the site embeds its data in the initial HTML.
        name: 'corsproxy.io (raw HTML)',
        jsRendered: false,
        build: url => 'https://corsproxy.io/?' + encodeURIComponent(url),
        extract: res => res.text(),
        timeout: 15000,
      },
      {
        name: 'allorigins.win (raw HTML)',
        jsRendered: false,
        build: url => 'https://api.allorigins.win/get?url=' + encodeURIComponent(url),
        extract: res => res.json().then(d => d.contents || ''),
        timeout: 15000,
      },
      {
        name: 'codetabs.com (raw HTML)',
        jsRendered: false,
        build: url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
        extract: res => res.text(),
        timeout: 15000,
      },
    ];

    // Init URL field
    document.getElementById('url-input').value = DEFAULT_URL;

    function resetUrl() {
      document.getElementById('url-input').value = DEFAULT_URL;
      addLog('info', 'URL reset to default.');
    }

    /* ── Logging ── */
    function ts() {
      return new Date().toLocaleTimeString('en-CA', { hour12: false });
    }

    function addLog(level, msg) {
      const box = document.getElementById('log-box');
      const empty = box.querySelector('.log-empty');
      if (empty) empty.remove();

      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML =
        `<span class="log-ts">[${ts()}]</span>` +
        `<span class="log-msg ${level}">${esc(msg)}</span>`;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log-box').innerHTML =
        '<span class="log-empty">No requests yet.</span>';
    }

    /* ── Fetch via a single proxy (throws on failure) ── */
    async function fetchViaProxy(proxy, targetUrl) {
      const proxyUrl = proxy.build(targetUrl);
      addLog('dim', `Trying: ${proxy.name}`);
      if (proxy.jsRendered) {
        addLog('info', 'Headless browser loading page — waiting for JavaScript to render…');
      }
      addLog('dim', `GET ${proxyUrl.slice(0, 90)}…`);

      const t0 = Date.now();
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(proxy.timeout || 15000) });
      const elapsed = Date.now() - t0;

      addLog('info', `${proxy.name} → HTTP ${res.status} ${res.statusText} (${elapsed} ms)`);
      addLog('dim',  `Content-Type: ${res.headers.get('content-type') || 'unknown'}`);

      if (!res.ok) throw new Error(`HTTP ${res.status} from ${proxy.name}`);

      const html = await proxy.extract(res);
      addLog('dim', `Response body size: ${html.length.toLocaleString()} characters`);
      if (!html) throw new Error(`${proxy.name} returned empty body`);

      return html;
    }

    /* ── Main check ── */
    async function checkAvailability() {
      const btn = document.getElementById('check-btn');
      const status = document.getElementById('status');
      const lastChecked = document.getElementById('last-checked');

      const targetUrl = document.getElementById('url-input').value.trim();
      if (!targetUrl) {
        addLog('error', 'URL is empty. Please enter a booking URL.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Checking…';
      status.innerHTML = '<span class="badge loading">Checking…</span>';
      lastChecked.textContent = '';

      addLog('info', '── New check started ──');
      addLog('dim',  `Target URL: ${targetUrl}`);

      let html = null;
      let lastErr = null;

      for (const proxy of PROXIES) {
        try {
          html = await fetchViaProxy(proxy, targetUrl);
          addLog('info', `✓ Fetched via ${proxy.name}${proxy.jsRendered ? ' (JS-rendered content)' : ' (static HTML only)'}`);
          if (!proxy.jsRendered) {
            addLog('warn', 'Warning: this proxy returns raw HTML without executing JavaScript. Results may be incomplete for SPA sites.');
          }
          break;
        } catch (err) {
          lastErr = err;
          addLog('warn', `✗ ${proxy.name} failed: ${err.message} — trying next proxy…`);
        }
      }

      if (html === null) {
        addLog('error', `All proxies failed. Last error: ${lastErr?.message}`);
        status.innerHTML = `
          <span class="badge unavailable">Error</span>
          <span class="error-msg">All proxies failed. Last error: ${esc(lastErr?.message)}</span>`;
        btn.disabled = false;
        btn.textContent = 'Check Availability';
        addLog('dim', '── Check complete ──');
        return;
      }

      addLog('info', 'Scanning for "Enroll Now" results (excluding Women)…');
      const available = findNonWomenEnrollNow(html);

      if (available) {
        addLog('success', `✓ AVAILABLE — open non-Women, non-Lesson slot found`);
        status.innerHTML = `
          <span class="badge available">✓ Available!</span>
          <span class="detail">Open spots found — enroll now!</span>
          <a class="booking-link" href="${esc(targetUrl)}" target="_blank" rel="noopener">
            Open booking site →
          </a>`;
      } else {
        addLog('warn', '✗ No qualifying slots — all were Women\'s or Lessons, or none found.');
        status.innerHTML = `
          <span class="badge unavailable">No Openings</span>
          <span class="detail">No open spots (excluding Women's &amp; Lessons) found at this time.</span>
          <a class="booking-link" href="${esc(targetUrl)}" target="_blank" rel="noopener">
            Check booking site →
          </a>`;
      }

      lastChecked.textContent = `Last checked: ${new Date().toLocaleTimeString()}`;
      btn.disabled = false;
      btn.textContent = 'Check Availability';
      addLog('dim', '── Check complete ──');
    }

    /*
     * Finds "Enroll Now" occurrences that are:
     *   - NOT a Women / Women's activity
     *   - NOT a lesson (beginner/intermediate/advanced lessons)
     *
     * For each match, inspect up to 3000 chars of context before it
     * (one activity card worth of content) plus 200 chars after.
     */
    function findNonWomenEnrollNow(html) {
      const enrollPattern = /enroll\s*now/gi;
      let match;
      let total = 0, skippedWomen = 0, skippedLesson = 0, qualified = 0;

      while ((match = enrollPattern.exec(html)) !== null) {
        total++;
        const contextStart = Math.max(0, match.index - 3000);
        const before = html.slice(contextStart, match.index);
        const after  = html.slice(match.index, Math.min(html.length, match.index + 200));
        const context = before + after;

        const isWomen  = /\bwomen'?s?\b/i.test(context);
        const isLesson = /\blessons?\b/i.test(context);

        const snippet = before.slice(-120).replace(/\s+/g, ' ').trim().slice(-100);
        addLog('dim', `  Match #${total}: isWomen=${isWomen}, isLesson=${isLesson} | …${snippet}`);

        if (isWomen) {
          skippedWomen++;
          addLog('warn', `  → Skipped (Women's activity)`);
        } else if (isLesson) {
          skippedLesson++;
          addLog('warn', `  → Skipped (Lesson)`);
        } else {
          qualified++;
          addLog('info', `  → Qualifies as open non-Women, non-Lesson slot`);
        }
      }

      addLog('dim',
        `Total: ${total} | Skipped Women: ${skippedWomen} | Skipped Lessons: ${skippedLesson} | Qualified: ${qualified}`
      );
      return qualified > 0;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
